# Azure Pipeline — Build & Deploy to Azure App Service (Direct Code Deployment)
# Uses Python runtime on Azure App Service (no Docker required)

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  pythonVersion: '3.11'
  # ── Configure these in Azure DevOps Pipeline Variables ──
  # AZURE_SUBSCRIPTION:  Your Azure service connection name
  # APP_SERVICE_NAME:    Your App Service name (e.g. compliance-game-app)

stages:

# ── Stage 1: Build ───────────────────────────────────────
- stage: Build
  displayName: Build Application
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: UsePythonVersion@0
      displayName: Set Python $(pythonVersion)
      inputs:
        versionSpec: '$(pythonVersion)'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: Install Python dependencies

    - script: |
        npm install --production
      displayName: Install Node.js dependencies (Phaser)

    - task: ArchiveFiles@2
      displayName: Archive files for deployment
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true

    - publish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
      displayName: Publish artifact
      artifact: drop

# ── Stage 2: Deploy to Azure App Service ─────────────────
- stage: Deploy
  displayName: Deploy to App Service
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployWeb
    displayName: Deploy to Azure Web App
    pool:
      vmImage: ubuntu-latest
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: UsePythonVersion@0
            displayName: Set Python $(pythonVersion)
            inputs:
              versionSpec: '$(pythonVersion)'

          - task: AzureWebApp@1
            displayName: Deploy to App Service
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              appType: 'webAppLinux'
              appName: '$(APP_SERVICE_NAME)'
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              runtimeStack: 'PYTHON|3.11'
              startUpCommand: 'bash /home/site/wwwroot/startup.sh'
