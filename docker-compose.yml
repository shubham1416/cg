version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: compliance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/compliance
      CG_SECRET: change-me-in-production
      CG_ADMIN_PASS: admin123
      # GEMINI_API_KEY: your-key-here
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
    driver: local
